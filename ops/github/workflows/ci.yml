name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check apps

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --directory apps/api
      - run: uv pip install --python .venv/bin/python https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl
      - run: uv run --directory apps/api pytest -v

  test-mcp:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - file_search
          - web_fetch
          - sqlite_query
          - github
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --directory apps/mcp_servers/${{ matrix.app }}
      - run: uv run --directory apps/mcp_servers/${{ matrix.app }} --with pytest pytest tests -q

  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f apps/api/Dockerfile .
      - run: docker build -f apps/mcp_servers/file_search/Dockerfile .
      - run: docker build -f apps/mcp_servers/web_fetch/Dockerfile .
      - run: docker build -f apps/mcp_servers/sqlite_query/Dockerfile .
      - run: docker build -f apps/mcp_servers/github/Dockerfile .
      - run: docker build -f apps/ui/Dockerfile .

  redteam:
    needs: [lint, test-api, test-mcp]
    uses: ./.github/workflows/redteam.yml
