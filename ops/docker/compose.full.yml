services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/agentforge
      API_KEY: ${API_KEY:-dev-key}
      API_PORT: 8000
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/free}
      MCP_FILE_SEARCH_URL: http://file_search:8101/mcp
      MCP_WEB_FETCH_URL: http://web_fetch:8102/mcp
      MCP_SQLITE_QUERY_URL: http://sqlite_query:8103/mcp
      MCP_GITHUB_URL: http://github:8104/mcp
      ORCHESTRATOR_CHECKPOINT_PATH: runtime/orchestrator_checkpoints.sqlite
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./fixtures:/app/fixtures
      - api-runtime:/app/apps/api/runtime
    depends_on:
      db:
        condition: service_healthy
      file_search:
        condition: service_healthy
      web_fetch:
        condition: service_healthy
      sqlite_query:
        condition: service_healthy
      github:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  db:
    image: postgres:16.1-alpine
    environment:
      POSTGRES_DB: agentforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  file_search:
    build:
      context: .
      dockerfile: apps/mcp_servers/file_search/Dockerfile
    environment:
      PORT: 8101
      CORPUS_PATH: /data/corpus
    ports:
      - "8101:8101"
    volumes:
      - ./fixtures/corpus:/data/corpus:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request,urllib.error; req=urllib.request.Request('http://127.0.0.1:8101/mcp', method='OPTIONS');\ntry:\n urllib.request.urlopen(req, timeout=3); sys.exit(0)\nexcept urllib.error.HTTPError as exc:\n sys.exit(0 if exc.code in (200,204,400,404,405) else 1)\nexcept Exception:\n sys.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web_fetch:
    build:
      context: .
      dockerfile: apps/mcp_servers/web_fetch/Dockerfile
    environment:
      PORT: 8102
    ports:
      - "8102:8102"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request,urllib.error; req=urllib.request.Request('http://127.0.0.1:8102/mcp', method='OPTIONS');\ntry:\n urllib.request.urlopen(req, timeout=3); sys.exit(0)\nexcept urllib.error.HTTPError as exc:\n sys.exit(0 if exc.code in (200,204,400,404,405) else 1)\nexcept Exception:\n sys.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  sqlite_query:
    build:
      context: .
      dockerfile: apps/mcp_servers/sqlite_query/Dockerfile
    environment:
      PORT: 8103
      SYNTHETIC_DB_PATH: /data/synthetic.sqlite
    ports:
      - "8103:8103"
    volumes:
      - ./fixtures/synthetic.sqlite:/data/synthetic.sqlite:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request,urllib.error; req=urllib.request.Request('http://127.0.0.1:8103/mcp', method='OPTIONS');\ntry:\n urllib.request.urlopen(req, timeout=3); sys.exit(0)\nexcept urllib.error.HTTPError as exc:\n sys.exit(0 if exc.code in (200,204,400,404,405) else 1)\nexcept Exception:\n sys.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  github:
    build:
      context: .
      dockerfile: apps/mcp_servers/github/Dockerfile
    env_file: .env
    environment:
      PORT: 8104
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    ports:
      - "8104:8104"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request,urllib.error; req=urllib.request.Request('http://127.0.0.1:8104/mcp', method='OPTIONS');\ntry:\n urllib.request.urlopen(req, timeout=3); sys.exit(0)\nexcept urllib.error.HTTPError as exc:\n sys.exit(0 if exc.code in (200,204,400,404,405) else 1)\nexcept Exception:\n sys.exit(1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    environment:
      AGENTFORGE_API_URL: http://api:8000
      AGENTFORGE_API_KEY: ${API_KEY:-dev-key}
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8501', timeout=5).status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  api-runtime:
